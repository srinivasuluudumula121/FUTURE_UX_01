                                <h1 className="text-6xl font-bold text-on-surface leading-tight font-epilogue">

                                <p className="text-lg text-on-surface-variant max-w-md">

                                        <div className="space-y-2">
                                            <label className="block text-sm font-semibold px-1">Select Treatment</label>
                                            <select className="w-full px-6 py-4 rounded-[18px] bg-background border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none appearance-none">

                                                <option>Anna Nagar, Chennai</option>

                                    </div>
                                    <button className="w-full bg-primary text-white py-5 rounded-full font-bold text-lg healthcare-shadow hover:bg-on-primary-container transition-all flex items-center justify-center gap-3 active:scale-95" type="submit">
                                        Confirm Appointment Request
                                        <span className="material-symbols-outlined">arrow_forward</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const { pathname } = useLocation();

            // Scroll to top on route change
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [pathname]);

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow">
                        <Routes>
                            <Route path="/" element={<HomePage />} />
                            <Route path="/treatments" element={<TreatmentPage />} />
                            <Route path="/book" element={<BookingPage />} />
                        </Routes>
                    </main>
                    <Footer />

        const root = createRoot(document.getElementById('root'));
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
